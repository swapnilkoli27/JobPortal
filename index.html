<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>MyJobUniverse – Find Your Dream Job in India</title>
    <meta name="description"
      content="Discover thousands of job opportunities in India. Search by category, location, and salary. Apply instantly to top companies." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="MyJobUniverse" />
    <meta property="og:title"       content="MyJobUniverse – Find Your Dream Job in India" />
    <meta property="og:description" content="India's fastest growing job portal." />
    <meta property="og:url"         content="https://myjobuniverse.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MyJobUniverse – Find Your Dream Job" />
    <meta name="twitter:description" content="Discover thousands of jobs in India." />

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7770934067915622"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
